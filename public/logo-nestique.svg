<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 235" width="200" height="235">
  <!-- House outline -->
  <path d="M100 10 L185 70 L168 70 L168 162 L32 162 L32 70 L15 70 Z"
        fill="none" stroke="#4a5c6e" stroke-width="4"
        stroke-linejoin="miter" stroke-linecap="square"/>

  <!-- Nest — concentric + rotated ellipses in gold -->
  <ellipse cx="100" cy="130" rx="8"  ry="4"  fill="none" stroke="#c9a84c" stroke-width="1.8"/>
  <ellipse cx="100" cy="130" rx="16" ry="8"  fill="none" stroke="#c9a84c" stroke-width="1.8"/>
  <ellipse cx="100" cy="131" rx="24" ry="11" fill="none" stroke="#c9a84c" stroke-width="1.8"/>
  <ellipse cx="100" cy="132" rx="33" ry="14" fill="none" stroke="#c9a84c" stroke-width="1.8"/>
  <ellipse cx="100" cy="133" rx="42" ry="17" fill="none" stroke="#c9a84c" stroke-width="1.8"/>
  <ellipse cx="100" cy="134" rx="50" ry="19" fill="none" stroke="#c9a84c" stroke-width="1.8"/>

  <ellipse cx="100" cy="131" rx="26" ry="11" fill="none" stroke="#c9a84c" stroke-width="1.2" opacity="0.65" transform="rotate(22 100 131)"/>
  <ellipse cx="100" cy="131" rx="26" ry="11" fill="none" stroke="#c9a84c" stroke-width="1.2" opacity="0.65" transform="rotate(-22 100 131)"/>
  <ellipse cx="100" cy="131" rx="36" ry="14" fill="none" stroke="#c9a84c" stroke-width="1.2" opacity="0.55" transform="rotate(38 100 131)"/>
  <ellipse cx="100" cy="131" rx="36" ry="14" fill="none" stroke="#c9a84c" stroke-width="1.2" opacity="0.55" transform="rotate(-38 100 131)"/>
  <ellipse cx="100" cy="131" rx="45" ry="17" fill="none" stroke="#c9a84c" stroke-width="1.1" opacity="0.45" transform="rotate(55 100 131)"/>
  <ellipse cx="100" cy="131" rx="45" ry="17" fill="none" stroke="#c9a84c" stroke-width="1.1" opacity="0.45" transform="rotate(-55 100 131)"/>

  <!-- Bird body -->
  <ellipse cx="100" cy="115" rx="13" ry="9" fill="#4a5c6e" transform="rotate(-8 100 115)"/>
  <!-- Bird head -->
  <circle cx="110" cy="108" r="7.5" fill="#4a5c6e"/>
  <!-- Bird tail -->
  <path d="M89 119 C83 116 77 122 75 119 C80 113 86 113 90 117 Z" fill="#4a5c6e"/>
  <!-- Bird beak -->
  <path d="M117 107 L124 109 L117 111 Z" fill="#4a5c6e"/>
  <!-- Bird eye -->
  <circle cx="113" cy="106" r="1.5" fill="#ffffff"/>
  <!-- Feet -->
  <line x1="98"  y1="123" x2="97"  y2="129" stroke="#4a5c6e" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="103" y1="123" x2="104" y2="129" stroke="#4a5c6e" stroke-width="1.4" stroke-linecap="round"/>

  <!-- "Nestique" text -->
  <text x="100" y="194"
        text-anchor="middle"
        font-family="Georgia, 'Palatino Linotype', 'Book Antiqua', serif"
        font-size="32"
        font-weight="400"
        fill="#3d4a5c"
        letter-spacing="0.5">Nestique</text>

  <!-- "STUDIO" text -->
  <text x="103" y="213"
        text-anchor="middle"
        font-family="'Trebuchet MS', 'Arial', sans-serif"
        font-size="10"
        font-weight="700"
        fill="#c9a84c"
        letter-spacing="5">STUDIO</text>
</svg>
